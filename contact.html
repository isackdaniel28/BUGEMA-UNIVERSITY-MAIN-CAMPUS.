<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Delete your old Font Awesome link and paste this one on a single line instead -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="sub-header">
        <nav>
            <a href="index.html"><img src="images/logo.png" alt="Bugema University Logo"></a>
            <div class="nav-links" id="navLinks">
                <ul>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </div>
        </nav>
        <h1>Contact</h1>
    </section>

    <section class="contact-section">
        
        <h2 class="section-title">General Contact Information</h2>
        
    <div class="info-row">
    
    <!-- 1. The Map Location Icon -->
    <div class="info-col">
        <i class="fa-regular fa-map"></i>
        <p>Kampala, Uganda</p>
        <p>P.O BOX 6529 Kla Ug</p>
    </div>

    <!-- 2. The Phone Icon -->
    <div class="info-col">
        <i class="fa-solid fa-phone"></i>
        <p>+256 702 940 003</p>
        <p>+256 312 351 400</p>
    </div>

    <!-- 3. The Envelope Mail Icon -->
    <div class="info-col">
        <i class="fa-regular fa-envelope"></i>
        <p>info@bugemauniv.ac.ug</p>
        <p>marketing@bugemauniv.ac.ug</p>
    </div>

    <!-- 4. The Clock Icon -->
    <div class="info-col">
        <i class="fa-regular fa-clock"></i>
        <p>Mon-Fri: 8 AM – 4 PM</p>
        <p>Saturday: Sabbath Day</p>
    </div>
    
</div>

        <hr class="divider">

        <h2 class="section-title">Get in Touch</h2>

        <div class="form-container">
            <form action="contact.html" method="PGET">
                <div class="form-group">
                    <label for="name">Your Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+256702940003">
                </div>

                <div class="form-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
                </div>

                <button type="submit" class="hero-btn red-btn">Send Message</button>
            </form>
        </div>
 <a href="index.html" class="home-btn">Back to Home</a>
    </section>

    <a href="https://wa.me/256702940003" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
        <span class="notification-badge"></span>
    </a>

</body>
</html>
